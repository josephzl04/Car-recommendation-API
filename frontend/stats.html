<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Stats - CarAPI</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>
    <nav>
        <div class="nav-brand">CarAPI</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="search.html">Search</a></li>
            <li><a href="recommend.html">Recommend</a></li>
            <li><a href="stats.html">Stats</a></li>
            <li><a href="similar.html">Similar</a></li>
            <li><a href="car.html">Car Details</a></li>
            <li><a href="admin.html">Admin</a></li>
        </ul>
    </nav>

    <main class="page-content">
        <h1>Market Stats</h1>
        <p class="page-subtitle">Dataset insights and market trends</p>
        
        <div class="stats-section">
            <h2>Top 10 Most Affordable Manufacturers</h2>
            <div id="manufacturers" class="table-container"></div>
        </div>

        <div class="stats-section">
            <h2>Price Trends by Year</h2>
            <canvas id="price-chart" height="100"></canvas>
        </div>

        <div class="stats-section">
            <h2>Price by Car Body Type</h2>
            <div id="body-types" class="table-container"></div>
        </div>
        
        <div class="stats-section">
            <h2>Top 5 States with Best Value Cars</h2>
            <div id="states" class="table-container"></div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/stats.js"></script>

</body>
</html>
